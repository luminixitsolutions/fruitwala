<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="fwLeaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="fwCitrus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="fwWord" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <!-- Mark: citrus + leaf -->
  <g transform="translate(2,4)">
    <circle cx="20" cy="20" r="18" fill="url(#fwCitrus)" opacity="0.95"/>
    <path d="M20 6c-6 4-10 10-10 17a18 18 0 0036 0c0-7-4-13-10-17" fill="#fff7ed" opacity="0.35"/>
    <ellipse cx="20" cy="20" rx="3" ry="14" fill="#fff" opacity="0.2" transform="rotate(-12 20 20)"/>
    <path d="M20 2c-2 6-8 10-14 10 2 6 8 10 14 10 6 0 12-4 14-10-6 0-12-4-14-10z" fill="url(#fwLeaf)"/>
    <path d="M20 2v6" stroke="#14532d" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  </g>
  <!-- Wordmark -->
  <text x="52" y="32" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="800" letter-spacing="-0.03em" fill="url(#fwWord)">Fruitwala</text>
  <text x="52" y="44" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-weight="700" letter-spacing="0.22em" fill="#64748b">FRESH PRODUCE</text>
